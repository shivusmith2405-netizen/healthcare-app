<div class="container mt-5">

<h2 class="text-center mb-4">AI Health Assistant</h2>

<div class="card p-4 shadow">

<input id="question" class="form-control mb-3" placeholder="Ask health question">

<button class="btn btn-primary" onclick="askAI()">Ask</button>

<p id="response" class="mt-3"></p>

</div>

</div>

<script>

function askAI(){

let q=document.getElementById("question").value

fetch("http://127.0.0.1:5000/health_ai",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({question:q})

})

.then(res=>res.json())

.then(data=>{

document.getElementById("response").innerText=data.answer

})

}

</script>
