<div class="container mt-5">

<h2 class="text-center mb-4">Book Appointment</h2>

<div class="card p-4 shadow">

<input id="user_id" class="form-control mb-3" placeholder="User ID">

<input id="doctor_id" class="form-control mb-3" placeholder="Doctor ID">

<input id="date" type="date" class="form-control mb-3">

<button class="btn btn-success" onclick="bookAppointment()">Book</button>

</div>

</div>

<script>

function bookAppointment(){

let user=document.getElementById("user_id").value
let doctor=document.getElementById("doctor_id").value
let date=document.getElementById("date").value

fetch("http://127.0.0.1:5000/book_appointment",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

user_id:user,
doctor_id:doctor,
date:date

})

})

.then(res=>res.json())

.then(data=>alert(data.message))

}

</script>
