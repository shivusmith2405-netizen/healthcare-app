<div class="container mt-5">

<h2 class="text-center mb-4">Health Dashboard</h2>

<div id="records"></div>

<canvas id="weightChart"></canvas>

</div>

<script>

fetch("http://127.0.0.1:5000/get_health_records/1")

.then(res=>res.json())

.then(data=>{

let container=document.getElementById("records")

let weights=[]
let dates=[]

data.forEach(record=>{

let card=document.createElement("div")

card.className="card shadow p-3 mb-3"

card.innerHTML=`

<h5>Date: ${record[4]}</h5>

<p>Height: ${record[0]} cm</p>
<p>Weight: ${record[1]} kg</p>
<p>Blood Pressure: ${record[2]}</p>
<p>Notes: ${record[3]}</p>

`

container.appendChild(card)

weights.push(record[1])
dates.push(record[4])

})

let ctx=document.getElementById("weightChart")

new Chart(ctx,{

type:"line",

data:{

labels:dates,

datasets:[{

label:"Weight Progress",

data:weights,

borderColor:"blue",

fill:false

}]

}

})

})

</script>

</body>
</html>
