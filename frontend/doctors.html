<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Find Doctors</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.card{
margin-top:20px;
padding:20px;
border-radius:10px;
box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand" href="index.html">Healthcare App</a>

<div>

<a class="btn btn-light me-2" href="index.html">Home</a>

<a class="btn btn-light me-2" href="doctors.html">Doctors</a>

<a class="btn btn-light me-2" href="appointment.html">Appointments</a>

<a class="btn btn-light me-2" href="dashboard.html">Dashboard</a>

<a class="btn btn-light me-2" href="reels.html">Health Reels</a>

<a class="btn btn-light" href="ai.html">AI Assistant</a>
<a class="btn btn-light me-2" href="login.html">Login</a>

<a class="btn btn-light" href="register.html">Register</a>

</div>

</div>

</nav>

<div class="container mt-5">

<h2 class="text-center mb-4">Find Doctors</h2>

<div class="input-group mb-4">

<input
type="text"
id="search"
class="form-control"
placeholder="Enter specialization (Cardiologist)"
>

<button class="btn btn-primary" onclick="searchDoctor()">
Search
</button>

</div>

<div id="results"></div>

</div>

<script>

function searchDoctor(){

let specialization = document.getElementById("search").value

fetch(`http://127.0.0.1:5000/search_doctors?specialization=${specialization}`)

.then(res=>res.json())

.then(data=>{

let container = document.getElementById("results")

container.innerHTML=""

data.forEach(doc=>{

let card = document.createElement("div")

card.className="card"

card.innerHTML = `

<h4>${doc[1]}</h4>

<p><b>Specialization:</b> ${doc[2]}</p>

<p><b>Experience:</b> ${doc[3]} years</p>

<p><b>Hospital:</b> ${doc[4]}</p>

<p>⭐ Rating: 4.5</p>

<input 
type="number"
min="1"
max="5"
class="form-control mb-2"
id="rating-${doc[0]}"
placeholder="Rating (1-5)"
>

<input 
type="text"
class="form-control mb-2"
id="review-${doc[0]}"
placeholder="Write review"
>

<button 
class="btn btn-warning mb-2"
onclick="submitReview(${doc[0]})"
>
Submit Review
</button>

<br>

<button 
class="btn btn-success"
onclick="bookDoctor(${doc[0]})"
>
Book Appointment
</button>

`

container.appendChild(card)

})

})

}

function bookDoctor(doctor_id){

let appointment_date = new Date().toISOString().slice(0,19).replace("T"," ")

fetch("http://127.0.0.1:5000/book_appointment",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

user_id:1,
doctor_id:doctor_id,
appointment_date:appointment_date

})

})

.then(res=>res.json())

.then(data=>{
alert("Appointment booked successfully!")
})

}

function submitReview(doctor_id){

let rating = document.getElementById(`rating-${doctor_id}`).value

let review = document.getElementById(`review-${doctor_id}`).value

fetch("http://127.0.0.1:5000/add_review",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

doctor_id:doctor_id,
user_id:1,
rating:rating,
review:review

})

})

.then(res=>res.json())

.then(data=>{
alert("Review submitted!")
})

}

</script>

</body>
</html>
