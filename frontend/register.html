<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center">User Registration</h2>

<div class="card p-4 mt-4">

<input id="name" class="form-control mb-2" placeholder="Name">

<input id="email" class="form-control mb-2" placeholder="Email">

<input id="password" class="form-control mb-2" placeholder="Password">

<input id="age" class="form-control mb-2" placeholder="Age">

<input id="gender" class="form-control mb-2" placeholder="Gender">

<button class="btn btn-success" onclick="register()">Register</button>

</div>

</div>

<script>

function register(){

let data = {

name: document.getElementById("name").value,
email: document.getElementById("email").value,
password: document.getElementById("password").value,
age: document.getElementById("age").value,
gender: document.getElementById("gender").value

}

fetch("http://127.0.0.1:5000/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

})

.then(res=>res.json())

.then(data=>{

alert(data.message)

})

}

</script>

</body>
</html>
